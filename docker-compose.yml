services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: coupletravel
      POSTGRES_PASSWORD: coupletravel
      POSTGRES_DB: coupletravel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coupletravel"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Database=coupletravel;Username=coupletravel;Password=coupletravel
      - Blob__Provider=${BLOB_PROVIDER:-local}
      - Blob__LocalPath=/app/uploads
    ports:
      - "5000:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
